<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستوى البرود</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0d0d1a;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    overflow: hidden;
  }
  .live-badge {
    font-size: 12px;
    color: #444;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%; background: #1D9E75;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .title {
    font-size: 28px;
    font-weight: 700;
    color: #85B7EB;
    letter-spacing: 4px;
    text-align: center;
  }
  .pct {
    font-size: 88px;
    font-weight: 900;
    color: #378ADD;
    letter-spacing: 2px;
    line-height: 1;
    transition: color 0.5s;
    text-align: center;
  }
  .bar-wrap { width: 100%; max-width: 380px; }
  .bar-track {
    background: #111126;
    border-radius: 99px;
    height: 26px;
    overflow: hidden;
    border: 1px solid #1a1a3e;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: #378ADD;
    width: 0%;
    transition: width 0.6s cubic-bezier(.4,0,.2,1), background 0.5s;
  }
  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #333;
    margin-top: 6px;
  }
  .msg {
    font-size: 16px;
    color: #5DCAA5;
    text-align: center;
    min-height: 22px;
    transition: opacity 0.4s;
    letter-spacing: 0.5px;
  }
  .congrats {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: #042C53;
    border: 1px solid #185FA5;
    border-radius: 20px;
    padding: 2rem 2.5rem;
    text-align: center;
    max-width: 340px;
    animation: popIn 0.6s ease;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
  .congrats-icon { font-size: 52px; }
  .congrats h2 { font-size: 22px; color: #85B7EB; font-weight: 700; }
  .congrats p  { font-size: 14px; color: #5DCAA5; line-height: 1.7; }
  .particles { position: fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  .flake {
    position: absolute;
    font-size: 20px;
    animation: fall linear forwards;
    opacity: 0.5;
  }
  @keyframes fall {
    from { transform: translateY(-40px) rotate(0deg); opacity:0.6; }
    to   { transform: translateY(110vh) rotate(720deg); opacity:0; }
  }
  .last-update { font-size: 11px; color: #2a2a44; text-align: center; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="live-badge"><div class="dot"></div> مباشر</div>
<div class="title">❄ مستوى البرود</div>
<div class="pct" id="pct">0%</div>

<div class="bar-wrap">
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <div class="bar-labels">
    <span>فاتر</span>
    <span>بارد</span>
    <span>أسطوري</span>
  </div>
</div>

<div class="msg" id="msg">في انتظار البرود...</div>

<div class="congrats" id="congrats">
  <div class="congrats-icon">🧊</div>
  <h2>تهانينا!</h2>
  <p>لقد بلغت مرتبة البرود الأسطوري<br>أنت الآن من أبرد الناس على وجه الأرض</p>
</div>

<div class="last-update" id="last-update"></div>

<script>
const OWNER = 'cheikh-dz';
const REPO  = 'cool';
const RAW   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data.json`;

const STAGES = [
  [1,  'شيء ما يتغيّر في الجو...'],
  [15, 'الهواء بدأ يبرد من حولك'],
  [30, 'الناس يرتدون معاطفهم'],
  [50, 'درجة الحرارة انخفضت فجأة!'],
  [70, 'كل شيء يتجمد من حولك!'],
  [90, 'خطوة أخيرة نحو الأسطورة...'],
  [99, 'لحظة واحدة تفصلك عن التاريخ...'],
];

let prevCount = -1;
let snowInterval = null;

async function poll() {
  try {
    const res = await fetch(RAW + '?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    const count = Math.min(data.count || 0, 100);
    const pct = count;

    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('pct').textContent = pct + '%';
    const g = Math.round(138 - (pct / 100) * 80);
    const color = `rgb(30,${g},200)`;
    document.getElementById('bar').style.background = color;
    document.getElementById('pct').style.color = color;

    if (count > prevCount && pct < 100) spawnFlake();
    prevCount = count;

    let msg = 'في انتظار البرود...';
    for (const [t, m] of STAGES) { if (pct >= t) msg = m; }
    const el = document.getElementById('msg');
    if (el.textContent !== msg) {
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 300);
    }

    if (pct >= 100) {
      document.getElementById('congrats').style.display = 'flex';
      document.getElementById('msg').style.display = 'none';
      startSnow();
    } else {
      document.getElementById('congrats').style.display = 'none';
      document.getElementById('msg').style.display = 'block';
      stopSnow();
    }

    if (data.timestamp) {
      const d = new Date(data.timestamp);
      document.getElementById('last-update').textContent =
        'آخر تحديث: ' + d.toLocaleTimeString('ar');
    }
  } catch (e) {}
}

function spawnFlake() {
  const p = document.getElementById('particles');
  const el = document.createElement('span');
  el.className = 'flake';
  el.textContent = ['❄','❅','❆','🧊'][Math.floor(Math.random() * 4)];
  el.style.left = (Math.random() * 95) + '%';
  el.style.animationDuration = (2.5 + Math.random() * 2) + 's';
  p.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

function startSnow() {
  if (snowInterval) return;
  snowInterval = setInterval(spawnFlake, 200);
}

function stopSnow() {
  if (snowInterval) { clearInterval(snowInterval); snowInterval = null; }
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
